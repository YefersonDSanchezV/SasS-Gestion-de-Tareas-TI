version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: sass-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      TZ: America/Bogota
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sass-network
      - proxy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: sass-worker
    restart: unless-stopped
    command: python -m app.workers.email_worker
    env_file:
      - ./backend/.env
    environment:
      TZ: America/Bogota
    depends_on:
      - backend
    networks:
      - sass-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: sass-frontend
    restart: unless-stopped
    ports:
      - "5172:80"
    depends_on:
      - backend
    networks:
      - sass-network
      - proxy

networks:
  sass-network:
    driver: bridge
  proxy:
    external: true